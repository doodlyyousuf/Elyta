<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cus_dis_bot · Dashboard</title>
  <link rel="icon" href="https://z-cdn.chatglm.cn/z-ai/static/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body data-page="dashboard">
  <div class="aurora" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grain"></div>
    <div class="vignette"></div>
  </div>

  <header class="topbar">
    <div class="brand">
      <div class="logo"><i data-lucide="bot"></i></div>
      <span class="brand-name">cus_dis_bot</span>
    </div>
    <nav class="guide-tabs" id="nav" aria-label="Primary"></nav>
    <div class="spacer"></div>
    <div class="user-chip hidden" id="user-chip">
      <img id="user-avatar" alt="" />
      <span id="user-name"></span>
    </div>
    <a class="btn btn-sm" href="/auth/logout"><i data-lucide="log-out"></i>Logout</a>
  </header>

  <main id="main">
    <div class="loading"><div class="spinner"></div><span>Loading…</span></div>
  </main>

  <footer>cus_dis_bot dashboard · corrected codebase · powered by Z.ai Code</footer>
